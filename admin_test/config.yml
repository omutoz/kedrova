backend:
  name: test-repo

media_folder: "assets/images/uploads"
public_folder: "/kedrova/assets/images/uploads"

collections:
  - name: "site"
    label: "Site content (demo)"
    files:
      - label: "Artist profile"
        name: "profile"
        file: "content/site/profile.md"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Tagline", name: "tagline", widget: "string"}
          - {label: "About (UA)", name: "about_ua", widget: "text"}
          - {label: "About (EN)", name: "about_en", widget: "text"}
      - label: "Hero CTA"
        name: "hero_cta"
        file: "content/site/hero-cta.md"
        fields:
          - {label: "Button label UA", name: "label_ua", widget: "string"}
          - {label: "Button label EN", name: "label_en", widget: "string"}
          - {label: "Hover title", name: "hover_title", widget: "string"}
  - name: "releases"
    label: "Discography (demo)"
    folder: "content/releases"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Year", name: "year", widget: "number"}
      - {label: "Type", name: "type", widget: "select", options: ["Single", "EP", "Album"]}
      - {label: "Spotify ID", name: "spotify_id", widget: "string", required: false}
      - {label: "Cover", name: "cover", widget: "image", required: false}
  - name: "press"
    label: "Press (demo)"
    folder: "content/press"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Headline", name: "title", widget: "string"}
      - {label: "Source", name: "source", widget: "string"}
      - {label: "URL", name: "url", widget: "string"}
